version: "3.8"

services:
  redis:
    image: redis:7.2
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-39fedd58-224d-4886-99d0-a2d756b8bf68}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: minio
    restart: unless-stopped
    
    ports:
      - "9000:9000"      # API S3 (ứng dụng kết nối ở đây)
      - "9001:9001"      # MinIO Console (trình duyệt quản lý)

    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: 39fedd58-224d-4886-99d0-a2d756b8bf68   # Nên thay bằng mật khẩu mạnh hơn
      # Nếu muốn bật https thì thêm:
      # MINIO_SERVER_URL: https://minio.example.com
      # MINIO_BROWSER_REDIRECT_URL: https://console.minio.example.com

    command: server /data --console-address ":9001"

    volumes:
      - ./storage:/data
      # Nếu bạn muốn lưu config riêng (tùy chọn)
      # - ./minio-config:/root/.minio

    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
  mysql:
    image: mysql:8.0.44
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 39fedd58-224d-4886-99d0-a2d756b8bf68
      MYSQL_DATABASE: fashion_store_finals
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  redis_data:
  minio_data:
  mysql_data:
